name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist in this repo.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & publish ${{ github.event.inputs.tag || github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Verify tag matches application versions
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          ROOT_VERSION="v$(node -p "require('./package.json').version")"
          EXTENSION_VERSION="v$(node -p "require('./chrome-extension/package.json').version")"
          if [ "$TAG" != "$ROOT_VERSION" ] || [ "$TAG" != "$EXTENSION_VERSION" ]; then
            echo "::error::Tag $TAG does not match application versions."
            echo "package.json: $ROOT_VERSION"
            echo "chrome-extension/package.json: $EXTENSION_VERSION"
            echo "Run 'pnpm update-version ${TAG#v}' and re-tag before releasing."
            exit 1
          fi
          echo "Tag and application versions are all at $TAG."

      - name: Build & zip for Chromium
        run: pnpm zip

      - name: Build & zip for Firefox
        run: pnpm zip:firefox

      - name: Stage release artifacts
        id: stage
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          mkdir -p release-artifacts
          # `pnpm zip` writes timestamped names into dist-zip/. Grab the latest
          # of each kind and rename to a stable, tag-keyed name so the release
          # page shows predictable assets.
          ZIP=$(ls -t dist-zip/*.zip | head -n1)
          XPI=$(ls -t dist-zip/*.xpi | head -n1)
          cp "$ZIP" "release-artifacts/openlingo-${TAG}-chromium.zip"
          cp "$XPI" "release-artifacts/openlingo-${TAG}-firefox.xpi"
          ls -lh release-artifacts/
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.stage.outputs.tag }}
          name: ${{ steps.stage.outputs.tag }}
          generate_release_notes: true
          files: |
            release-artifacts/openlingo-*-chromium.zip
            release-artifacts/openlingo-*-firefox.xpi
